<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta property="og:title" content="형민 & 진아 결혼합니다 💍">
    <meta property="og:description" content="2026년 10월 11일 일요일 오후 3시, 서울대학교 교수회관">
    <meta property="og:image" content="https://gna-king.github.io/happy-wedding-day/main-photo.jpg">
    <meta property="og:url" content="https://gna-king.github.io/happy-wedding-day/">
    <meta property="og:type" content="website">

    <title>형민 & 진아 결혼합니다</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Great+Vibes&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        /* 픽셀 폰트 추가 */
        @font-face {
            font-family: 'DungGeunMo';
            src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_six@1.2/DungGeunMo.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background-color: #f6f5f5; font-family: 'Noto Sans KR', sans-serif; color: #333; display: flex; justify-content: center; }
        
        .phone-wrapper { width: 100%; max-width: 420px; background-color: #ffffff; min-height: 100vh; position: relative; overflow-x: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03); padding-bottom: 80px; }

        .section { padding: 70px 24px; text-align: center; }
        
        .section-title { font-family: 'Gowun Batang', serif; font-size: 28px; font-weight: 700; color: #8c8279; letter-spacing: 0.25em; margin-bottom: 45px; }
        .section-title2 { font-family: 'Gowun Batang', serif; font-size: 20px; font-weight: 700; color: #8c8279; letter-spacing: 0.25em; margin-bottom: 45px; }

        /* --- [메인 커버 및 버튼] --- */
        .main-cover { width: 100%; height: auto; display: flex; flex-direction: column; align-items: center; background-color: #c1b29e; }
        .main-img-placeholder { width: 100%; aspect-ratio: 4/5; background-color: #c1b29e; display: flex; align-items: center; justify-content: center; color: #aaa; font-weight: 300; overflow: hidden; }
        .main-img-placeholder img { width: 100%; height: 100%; object-fit: cover; } 

        .btn-wrap { padding: 30px 24px 40px 24px; width: 100%; text-align: center; background-color: #c1b29e; }
        
        @keyframes float-btn {
            0%, 100% { transform: translateY(0); box-shadow: 4px 4px 0 #333; }
            50% { transform: translateY(-4px); box-shadow: 6px 8px 0 #333; }
        }

        .btn-story { 
            width: 100%; padding: 16px 0; background-color: #fc9; border: 3px solid #333; 
            box-shadow: 4px 4px 0 #333; color: #333; font-family: 'DungGeunMo', sans-serif; 
            font-size: 18px; 
            cursor: pointer; transition: all 0.1s; letter-spacing: 1px;
            animation: float-btn 1.5s infinite ease-in-out;
        }
        .btn-story:active { animation: none; box-shadow: 0 0 0 #333; transform: translate(4px, 4px); }
        
        .main-text { padding: 70px 0 40px 0; text-align: center; background-color: #ffffff; width: 100%; }
        
        /* [변경] 위아래 간격을 더 넉넉하게 주기 위해 margin 값 수정 */
        .wedding-subtitle { font-family: 'Great Vibes', cursive; font-size: 50px; color: #8c8279; margin-top: 50px; margin-bottom: 45px; }
        
        .main-text h1 { font-family: 'Gowun Batang', serif; font-size: 28px; font-weight: 700; color: #222; margin-bottom: 25px; letter-spacing: 3px; }
        .main-text p { font-family: 'Gowun Batang', serif; font-size: 16px; color: #666; line-height: 1.8; letter-spacing: 0.5px; }
        
        .greeting-wrap { background-color: #faf9f8; padding: 80px 24px; text-align: center; }
        .greeting-text { font-family: 'Gowun Batang', serif; font-size: 16px; line-height: 2.2; color: #444; margin-bottom: 50px; }
        .parents-info { font-family: 'Gowun Batang', serif; font-size: 16px; color: #333; line-height: 2; }
        .parents-info strong { font-weight: 700; font-size: 17px; margin-left: 6px; }
        
        /* --- [갤러리 스타일] --- */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; padding: 0 10px; }
        .gallery-item { aspect-ratio: 1/1; background-color: #f2f0ed; overflow: hidden; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .gallery-item:nth-child(n+7) { display: none; }

        .lightbox {
            display: none; position: fixed; z-index: 9999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            align-items: center; justify-content: center; flex-direction: column;
        }
        .lightbox-content { max-width: 100%; max-height: 80vh; object-fit: contain; }
        .lightbox-close { position: absolute; top: 20px; right: 20px; color: white; font-size: 35px; cursor: pointer; padding: 10px; font-weight: bold; }
        .lightbox-btn { position: absolute; top: 50%; transform: translateY(-50%); color: white; font-size: 30px; background: none; border: none; padding: 15px; cursor: pointer; }
        .lightbox-prev { left: 10px; }
        .lightbox-next { right: 10px; }
        .lightbox-counter { position: absolute; bottom: 30px; color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 14px; letter-spacing: 2px; }

        .cal-month { font-family: 'Gowun Batang', serif; font-size: 20px; font-weight: 700; color: #333; margin-bottom: 30px; }
        .cal-table { width: 100%; max-width: 280px; margin: 0 auto; border-collapse: collapse; }
        .cal-table th, .cal-table td { padding: 12px 0; font-size: 14px; color: #666; text-align: center; }
        .cal-table th { color: #a39c95; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .cal-table td.sun { color: #d67a7a; }
        .cal-table td.d-day span { background-color: #8c8279; color: #fff; border-radius: 50%; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; font-weight: 500; }
        .d-day-counter { margin-top: 35px; font-family: 'Gowun Batang', serif; font-size: 16px; color: #555; text-align: center; }
        .d-day-counter strong { color: #8c8279; font-weight: 700; font-size: 18px; }
        
        .contact-section { padding: 20px 24px 60px 24px; text-align: center; }
        .contact-wrap { margin-top: 30px; }
        .contact-row { display: flex; justify-content: space-between; align-items: center; padding: 18px 0; border-bottom: 1px solid #f1f1f1; }
        .contact-label { font-family: 'Gowun Batang', serif; font-size: 12px; color: #555; }
        .contact-label strong { font-weight: 700; color: #222; margin-left: 8px; font-size: 17px; }
        .contact-actions { display: flex; gap: 18px; }
        .contact-actions a { text-decoration: none; font-size: 18px; color: #8c8279; opacity: 0.8; }

        /* [변경] text-align: center 추가하여 Location 및 하위 요소 가운데 정렬 */
        .map-section { padding: 60px 24px; text-align: center; }
        .venue-info { text-align: center; margin-bottom: 35px; }
        .venue-name { font-family: 'Gowun Batang', serif; font-size: 22px; font-weight: 700; color: #222; margin-bottom: 10px; }
        .venue-addr { font-family: 'Gowun Batang', serif; font-size: 15px; color: #777; margin-bottom: 25px; line-height: 1.6; }
        .map-embed { width: 100%; height: 240px; background-color: #eee; margin-bottom: 15px; }
        .navi-btns { display: flex; gap: 8px; margin-bottom: 50px; }
        .navi-btn { flex: 1; padding: 12px 0; background-color: #f9f9f9; border: 1px solid #eaeaea; border-radius: 4px; text-decoration: none; display: flex; justify-content: center; align-items: center; gap: 6px; }
        .navi-btn span { font-size: 12px; color: #555; }
        .navi-btn svg { width: 20px; height: 20px; border-radius: 4px; }
        
        .way-item { display: flex; margin-bottom: 30px; align-items: flex-start; text-align: left; }
        .way-icon { width: 40px; }
        .way-icon svg { width: 20px; height: 20px; stroke: #8c8279; fill: none; stroke-width: 1.2; }
        .way-desc h4 { font-family: 'Gowun Batang', serif; font-size: 16px; font-weight: 700; color: #333; margin-bottom: 6px; }
        .way-desc p { font-size: 14px; color: #666; line-height: 1.7; }
        
        .account-wrap { background-color: #faf9f8; padding: 70px 24px; text-align: center; }
        .acc-desc { font-family: 'Gowun Batang', serif; font-size: 15px; color: #777; line-height: 1.8; margin-bottom: 40px; }
        .acc-box { margin-bottom: 10px; }
        .acc-btn { width: 100%; background-color: #fff; border: 1px solid #e1dfdc; padding: 16px 20px; display: flex; justify-content: space-between; font-size: 14px; color: #444; cursor: pointer; border-radius: 4px; }
        .acc-content { background-color: #fcfbfb; border: 1px solid #e1dfdc; border-top: none; padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
        .acc-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px dashed #e1dfdc; }
        .acc-info { text-align: left; font-size: 13.5px; color: #555; line-height: 1.6; }
        .copy-btn { padding: 6px 12px; background-color: #fff; border: 1px solid #ccc; font-size: 11px; color: #666; cursor: pointer; border-radius: 2px;}
    </style>
</head>
<body>

<div class="phone-wrapper">
    
    <div class="main-cover">
        <div class="main-img-placeholder">
            <img src="main-photo.jpg" alt="메인 사진">
        </div>
        <div class="btn-wrap">
            <button class="btn-story" onclick="location
