<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>진아 & 형민 결혼합니다</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 기본 초기화 및 폰트 세팅 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: #f6f5f5; /* PC 배경 */
            font-family: 'Noto Sans KR', sans-serif; 
            color: #333; 
            display: flex; 
            justify-content: center; 
        }
        
        /* 모바일 컨테이너 (URL 오리지널 너비) */
        .phone-wrapper { 
            width: 100%; max-width: 420px; 
            background-color: #ffffff; 
            min-height: 100vh; position: relative; 
            overflow: hidden; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
        }
        
        /* 타임라인 슬라이드 트랙 */
        .slider-track { display: flex; width: 200%; min-height: 100vh; transition: transform 0.6s cubic-bezier(0.65, 0, 0.35, 1); }
        .page { width: 50%; min-height: 100vh; overflow-y: auto; background-color: #fff; padding-bottom: 80px; }

        /* https://blog.naver.com/design_mag/223729896970 */
        .section { padding: 70px 24px; text-align: center; border-bottom: 1px solid #f9f9f9; }
        .section-title { 
            font-family: 'Nanum Myeongjo', serif; 
            font-size: 13px; color: #8c8279; /* URL 특유의 뮤트된 베이지/브라운 */
            letter-spacing: 0.25em; margin-bottom: 45px; 
            text-transform: uppercase;
        }

        /* 1. 메인 커버 */
        .main-cover { width: 100%; height: auto; display: flex; flex-direction: column; align-items: center; }
        .main-img-placeholder { width: 100%; height: 60vh; background-color: #f2f0ed; display: flex; align-items: center; justify-content: center; color: #aaa; font-weight: 300; }
        
        /* 추가된 스토리 버튼 (URL 디자인 톤앤매너 적용) */
        .btn-wrap { padding: 30px 24px 0 24px; width: 100%; }
        .btn-story { 
            width: 100%; padding: 15px 0; background-color: #fff; 
            border: 1px solid #e1dfdc; color: #555; 
            font-size: 13px; font-weight: 400; letter-spacing: 1px; cursor: pointer;
            border-radius: 2px; transition: background 0.2s;
        }
        .btn-story:active { background-color: #fbfbfb; }

        .main-text { padding: 40px 0 30px 0; }
        .main-text h1 { font-family: 'Nanum Myeongjo', serif; font-size: 26px; font-weight: 400; color: #222; margin-bottom: 25px; letter-spacing: 2px; }
        .main-text p { font-size: 14px; color: #777; line-height: 1.8; font-weight: 300; letter-spacing: 0.5px; }

        /* 2. 초대의 글 */
        .greeting-wrap { background-color: #faf9f8; padding: 80px 24px; text-align: center; }
        .greeting-text { font-size: 15px; line-height: 2.2; color: #444; font-weight: 300; margin-bottom: 50px; }
        .parents-info { font-size: 15px; color: #333; line-height: 2; font-weight: 300; }
        .parents-info strong { font-weight: 500; font-size: 16px; margin-left: 6px; }

        /* 3. 갤러리 (그리드) */
        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; padding: 0 10px; }
        .gallery-item { aspect-ratio: 1/1; background-color: #f2f0ed; }

        /* 4. 달력 */
        .cal-month { font-family: 'Nanum Myeongjo', serif; font-size: 18px; color: #333; margin-bottom: 30px; letter-spacing: 1px; }
        .cal-table { width: 100%; max-width: 280px; margin: 0 auto; border-collapse: collapse; }
        .cal-table th, .cal-table td { padding: 12px 0; font-size: 13px; font-weight: 300; color: #666; text-align: center; }
        .cal-table th { color: #a39c95; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .cal-table td.sun { color: #d67a7a; }
        .cal-table td.d-day span { 
            background-color: #8c8279; color: #fff; 
            border-radius: 50%; width: 26px; height: 26px; 
            display: inline-flex; align-items: center; justify-content: center; font-weight: 400; 
        }

        /* 5. 오시는 길 (지도 & 심플 아이콘) */
        .map-section { text-align: left; padding: 60px 24px; border-bottom: none; }
        .map-title { text-align: center; margin-bottom: 40px; }
        .venue-name { font-family: 'Nanum Myeongjo', serif; font-size: 18px; color: #222; margin-bottom: 8px; }
        .venue-addr { font-size: 14px; color: #777; font-weight: 300; margin-bottom: 25px; }
        
        .map-embed { width: 100%; height: 240px; background-color: #eee; margin-bottom: 15px; }
        
        /* 내비게이션 (URL 스타일의 둥근 모서리 버튼) */
        .navi-btns { display: flex; gap: 8px; margin-bottom: 50px; }
        .navi-btn { 
            flex: 1; padding: 12px 0; background-color: #f9f9f9; 
            border: 1px solid #eaeaea; border-radius: 4px; text-decoration: none; 
            display: flex; justify-content: center; align-items: center; gap: 6px; 
        }
        .navi-btn span { font-size: 12px; color: #555; font-weight: 400; }
        .navi-btn svg { width: 14px; height: 14px; border-radius: 3px; }

        /* 심플한 교통안내 아이콘 및 텍스트 */
        .way-item { display: flex; margin-bottom: 30px; align-items: flex-start; }
        .way-icon { width: 40px; }
        /* URL 느낌의 극도로 얇고 심플한 선형 아이콘 */
        .way-icon svg { width: 20px; height: 20px; stroke: #8c8279; fill: none; stroke-width: 1.2; }
        .way-desc h4 { font-size: 14.5px; font-weight: 500; color: #333; margin-bottom: 6px; letter-spacing: -0.3px; }
        .way-desc p { font-size: 14px; color: #666; font-weight: 300; line-height: 1.7; }

        /* 6. 마음 전하실 곳 (URL 스타일 아코디언) */
        .account-wrap { background-color: #faf9f8; padding: 70px 24px; text-align: center; }
        .acc-desc { font-size: 14px; color: #777; line-height: 1.8; font-weight: 300; margin-bottom: 40px; }
        
        .acc-box { margin-bottom: 10px; }
        .acc-btn { 
            width: 100%; background-color: #fff; border: 1px solid #e1dfdc; 
            padding: 16px 20px; display: flex; justify-content: space-between; 
            align-items: center; font-size: 14px; color: #444; font-weight: 400; cursor: pointer;
            border-radius: 2px;
        }
        .acc-btn:focus { outline: none; }
        
        .acc-content { 
            background-color: #fcfbfb; border: 1px solid #e1dfdc; border-top: none; 
            padding: 0 20px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; 
            border-radius: 0 0 2px 2px;
        }
        .acc-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px dashed #e1dfdc; }
        .acc-row:last-child { border-bottom: none; }
        .acc-info { text-align: left; font-size: 13.5px; color: #555; line-height: 1.6; font-weight: 300; }
        .acc-info strong { font-weight: 500; color: #333; }
        .copy-btn { padding: 6px 12px; background-color: #fff; border: 1px solid #ccc; font-size: 11px; color: #666; border-radius: 2px; cursor: pointer; }
        .copy-btn:active { background-color: #f4f4f4; }

        .show-timeline { transform: translateX(-50%); }
    </style>
</head>
<body>

<div class="phone-wrapper">
    <div class="slider-track" id="sliderTrack">
        
        <div class="page">
            
            <div class="main-cover">
                <div class="main-img-placeholder">[일러스트 또는 사진]</div>
                
                <div class="btn-wrap">
                    <button class="btn-story" onclick="goTimeline()">진아 · 형민 스토리 보러가기</button>
                </div>

                <div class="main-text">
                    <h1>형민 & 진아</h1>
                    <p>2026. 10. 11. SUN. PM 3:00<br>서울대학교 교수회관</p>

            </div>

            <div class="greeting-wrap">
                <div class="section-title">Invitation</div>

                    서로의 색깔을 잃지 않으면서도<br>
                    함께일 때 더 아름다운 빛을 내는<br>

                    오셔서 따뜻한 마음으로 축복해 주세요.
                </div>
                <div class="parents-info">
                    아버지 · 어머니 의 아들 <strong>형민</strong><br>
                    아버지 · 어머니 의 딸 <strong>진아</strong>
                </div>
            </div>

            <div class="section" style="padding-bottom: 40px;">
                <div class="section-title">Gallery</div>
                <div class="gallery-grid">
                    <div class="gallery-item"></div><div class="gallery-item"></div><div class="gallery-item"></div>
                    <div class="gallery-item"></div><div class="gallery-item"></div><div class="gallery-item"></div>
